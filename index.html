<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>John's Shuttle — Book Your Ride</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --asphalt:#1B2430;
    --asphalt-deep:#11161D;
    --amber:#E8912D;
    --amber-bright:#F5A845;
    --off-white:#F7F5F0;
    --slate:#5C6470;
    --line:rgba(247,245,240,0.12);
    --line-dark:rgba(27,36,48,0.12);
    --card-bg:#FFFFFF;
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}

  body{
    background:var(--off-white);
    color:var(--asphalt);
    font-family:'Inter',sans-serif;
    font-size:16.5px;
    line-height:1.6;
    overflow-x:hidden;
  }

  h1,h2,h3{
    font-family:'Barlow Condensed',sans-serif;
    font-weight:700;
    text-transform:uppercase;
  }

  .mono{font-family:'JetBrains Mono',monospace;}

  /* ---------- LANGUAGE ---------- */
  .lang-toggle{
    display:flex;border:1px solid var(--amber);
  }
  .lang-toggle button{
    background:transparent;border:none;color:var(--amber);
    font-family:'JetBrains Mono',monospace;
    padding:8px 14px;cursor:pointer;
  }
  .lang-toggle button.active{
    background:var(--amber);color:var(--asphalt);
  }

  .wrap{max-width:1080px;margin:0 auto;padding:0 28px;}

  /* ---------- HEADER ---------- */
  header{
    background:var(--asphalt);
    border-bottom:3px solid var(--amber);
  }
  .nav{
    display:flex;justify-content:space-between;align-items:center;
    padding:18px 28px;max-width:1080px;margin:0 auto;
  }
  .brand{
    display:flex;align-items:center;gap:10px;
    font-family:'Barlow Condensed';
    font-size:24px;color:var(--off-white);
  }
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--amber);}

  .header-call a{
    border:1px solid var(--amber);
    color:var(--amber);
    padding:8px 14px;
  }

  /* ---------- HERO ---------- */
  .hero{
    background:var(--asphalt);
    color:var(--off-white);
    padding:60px 28px;
  }
  .hero-inner{max-width:1080px;margin:auto;}

  .eyebrow{
    font-family:'JetBrains Mono';
    color:var(--amber);
    font-size:12px;
    margin-bottom:16px;
  }

  .hero h1{
    font-size:clamp(34px,5vw,54px);
    line-height:1.1;
  }
  .hero h1 span{color:var(--amber);}

  .lede{color:#c7ccd3;max-width:500px;}

  /* ---------- ROUTE ---------- */
  .route-line{
    display:flex;align-items:center;margin-top:30px;
    max-width:560px;
  }
  .route-point{flex:1;}
  .route-label{font-size:11px;color:#8b92a0;}
  .route-value{color:white;}

  /* ---------- TRUST ---------- */
  .trust{
    background:var(--asphalt-deep);
    padding:16px 0;
  }
  .trust .wrap{
    display:flex;gap:14px;flex-wrap:wrap;
    font-size:12px;color:#9aa1ad;
  }

  /* ---------- BOOKING ---------- */
  .booking-section{
    padding:64px 28px;
    max-width:1080px;margin:auto;
  }

  .form-card{
    background:white;
    padding:28px;
    border-top:4px solid var(--amber);
  }

  input,textarea{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
  }

  .btn-sms{
    background:var(--amber);
    padding:16px;
    border:none;
    font-weight:bold;
    cursor:pointer;
  }

  .btn-call{
    border:1px solid var(--asphalt);
    padding:14px;
    background:none;
  }

  /* ---------- SIDE ---------- */
  .side-card{
    background:var(--asphalt);
    color:white;
    padding:24px;
    margin-bottom:20px;
  }

  .step-num{
    background:var(--amber);
    color:var(--asphalt);
    width:22px;height:22px;
    border-radius:50%;
    display:inline-flex;
    align-items:center;
    justify-content:center;
  }

  .pay-card{
    background:white;
    padding:24px;
  }

  .payid-box{
    border:1px dashed #ccc;
    padding:12px;
    background:#f7f3ea;
  }

  /* ---------- AREAS ---------- */
  .areas-section{
    background:var(--asphalt-deep);
    color:white;
    padding:60px 28px;
  }

  .area-list{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    border:1px solid var(--line);
  }

  .area-item{
    padding:16px;
    border:1px solid var(--line);
  }

  /* ---------- FOOTER ---------- */
  footer{
    background:var(--asphalt);
    color:#9aa1ad;
    padding:40px 28px;
    border-top:3px solid var(--amber);
  }
</style>
</head>

<body>

<header>
  <div class="nav">
    <div class="brand"><span class="dot"></span>John's Shuttle</div>
    <div class="lang-toggle">
      <button id="langEn" class="active">EN</button>
      <button id="langZh">中文</button>
    </div>
    <div class="header-call">
      <a href="tel:0433159888">📞 0433 159 888</a>
    </div>
  </div>
</header>

<section class="hero">
  <div class="hero-inner">
    <div class="eyebrow" data-i18n="eyebrow"></div>

    <h1 data-i18n-html="heroTitle"></h1>

    <p class="lede" data-i18n="heroLede"></p>

    <div class="route-line">
      <div>
        <div class="route-label" data-i18n="pickupLabel"></div>
        <div class="route-value" id="previewPickup">—</div>
      </div>

      <div style="flex:1"></div>

      <div>
        <div class="route-label" data-i18n="dropoffLabel"></div>
        <div class="route-value" id="previewDropoff">—</div>
      </div>
    </div>
  </div>
</section>

<div class="trust">
  <div class="wrap">
    <span data-i18n="trust1"></span>
    <span data-i18n="trust2"></span>
    <span data-i18n="trust3"></span>
  </div>
</div>

<section class="booking-section" id="book">
  <form class="form-card" id="bookingForm">

    <input id="name" placeholder="Name" required>
    <input id="phone" placeholder="Phone" required>
    <input id="pickup" placeholder="Pickup" required>
    <input id="dropoff" placeholder="Drop-off" required>

    <input type="date" id="date" required>
    <input type="time" id="time" required>

    <textarea id="notes" placeholder="Notes"></textarea>

    <button type="button" class="btn-sms" id="sendSms">Send booking</button>
    <button type="button" class="btn-call" id="callJohn">Call John</button>

  </form>
</section>

<section class="areas-section">
  <div class="area-list">
    <div class="area-item">Airport</div>
    <div class="area-item">CBD</div>
    <div class="area-item">Suburbs</div>
    <div class="area-item">Stations</div>
  </div>
</section>

<footer>
  <div>© 2026 John's Shuttle</div>
</footer>

<script>
const I18N = {
  en: {
    eyebrow: "Local shuttle service",
    heroTitle: "Door to door.<br><span>Booked in one text.</span>",
    heroLede: "Send your trip details straight to John.",
    pickupLabel: "Pickup",
    dropoffLabel: "Drop-off",
    trust1: "Direct booking to John",
    trust2: "Pay on day or PayID",
    trust3: "Same-day welcome",
    smsHeader: "Booking request:"
  },
  zh: {
    eyebrow: "本地接送",
    heroTitle: "门到门接送。<br><span>一条短信预订。</span>",
    heroLede: "填写信息即可发送给 John。",
    pickupLabel: "上车地点",
    dropoffLabel: "目的地",
    trust1: "直接发送给 John",
    trust2: "可当天付款",
    trust3: "支持当天预订",
    smsHeader: "预订请求:"
  }
};

let lang="en";

function applyLang(l){
  lang=l;
  document.documentElement.lang=l;
  const d=I18N[l];

  document.querySelectorAll("[data-i18n]").forEach(e=>{
    e.textContent=d[e.dataset.i18n]||"";
  });

  document.querySelectorAll("[data-i18n-html]").forEach(e=>{
    e.innerHTML=d[e.dataset.i18nHtml]||"";
  });

  document.getElementById("langEn").classList.toggle("active",l==="en");
  document.getElementById("langZh").classList.toggle("active",l==="zh");
}

document.getElementById("langEn").onclick=()=>applyLang("en");
document.getElementById("langZh").onclick=()=>applyLang("zh");
applyLang("en");

const PHONE="0433159888";

document.getElementById("sendSms").onclick=()=>{
  const msg=
    I18N[lang].smsHeader+"\n"+
    "Name: "+document.getElementById("name").value+"\n"+
    "Pickup: "+document.getElementById("pickup").value+"\n"+
    "Drop-off: "+document.getElementById("dropoff").value;

  const url="sms:"+PHONE+"?body="+encodeURIComponent(msg);
  window.location.href=url;
};

document.getElementById("callJohn").onclick=()=>{
  window.location.href="tel:"+PHONE;
};
</script>

</body>
</html>

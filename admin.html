<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin - Bookings</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Replace YOUR_GOOGLE_MAPS_API_KEY with your real key -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDAVKfary7LXwe4phYjwYgf-t96I8foxfM&libraries=places,geocoding&callback=initAdminMap" async defer></script>
  <style>
    :root{
      --asphalt:#1B2430;
      --asphalt-deep:#11161D;
      --amber:#E8912D;
      --amber-bright:#F5A845;
      --off-white:#F7F5F0;
      --slate:#5C6470;
      --line:rgba(27,36,48,0.12);
      --green:#2F7A4D;
      --red:#c0392b;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      background:var(--off-white);
      color:var(--asphalt);
      font-family:'Inter',-apple-system,sans-serif;
      font-size:15px;
    }
    .topbar{
      background:var(--asphalt);color:var(--off-white);
      padding:20px 28px;border-bottom:3px solid var(--amber);
      display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;
    }
    .topbar h1{font-size:20px;font-weight:600;}
    .topbar p{font-size:13px;color:#9aa1ad;margin-top:2px;}
    .logout-btn{
      background:transparent;border:1px solid var(--amber);color:var(--amber);
      padding:8px 16px;font-size:13.5px;cursor:pointer;
    }
    .logout-btn:hover{background:var(--amber);color:var(--asphalt);}
    .container{max-width:1200px;margin:0 auto;padding:24px 28px 60px;}
    .toolbar{
      display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;
    }
    .toolbar button{
      background:var(--asphalt);color:var(--off-white);border:none;
      padding:10px 18px;font-size:13.5px;cursor:pointer;
    }
    .toolbar button:hover{background:var(--asphalt-deep);}
    .filter-tabs{display:flex;gap:8px;}
    .filter-tabs button{
      background:transparent;border:1px solid var(--line);color:var(--slate);
      padding:8px 14px;font-size:13px;cursor:pointer;
    }
    .filter-tabs button.active{background:var(--asphalt);color:var(--off-white);border-color:var(--asphalt);}
    table{width:100%;border-collapse:collapse;background:#fff;font-size:13.5px;}
    th, td{padding:12px 14px;text-align:left;border-bottom:1px solid var(--line);}
    th{
      background:var(--asphalt-deep);color:#9aa1ad;font-size:11.5px;
      letter-spacing:0.04em;text-transform:uppercase;font-weight:500;
    }
    tbody tr:hover{background:#faf8f3;}
    .status-badge{
      display:inline-block;padding:4px 10px;font-size:11.5px;font-weight:600;
      text-transform:uppercase;letter-spacing:0.03em;
    }
    .status-new{background:#fff4e6;color:#8a5a14;}
    .status-confirmed{background:rgba(47,122,77,0.12);color:var(--green);}
    .status-completed{background:rgba(27,36,48,0.08);color:var(--slate);}
    .status-cancelled{background:rgba(192,57,43,0.1);color:var(--red);}
    select.status-select{
      font-size:12.5px;padding:5px 8px;border:1px solid var(--line);background:#fff;
    }
    .row-actions{display:flex;gap:6px;}
    .row-actions button{
      font-size:12px;padding:5px 10px;border:1px solid var(--line);background:#fff;cursor:pointer;
    }
    .row-actions button:hover{background:#f5f2ea;}
    .row-actions button.delete-btn:hover{background:var(--red);color:#fff;border-color:var(--red);}
    .empty-state{
      text-align:center;padding:60px 20px;color:var(--slate);font-size:14px;
    }
    .loading-state{text-align:center;padding:40px;color:var(--slate);}
    .table-wrap{overflow-x:auto;border:1px solid var(--line);}
    .notes-cell{max-width:160px;font-size:12.5px;color:var(--slate);}

    /* ---- MAP MODAL ---- */
    .map-modal-overlay{
      display:none;position:fixed;inset:0;background:rgba(17,22,29,0.82);z-index:1000;
      align-items:center;justify-content:center;
    }
    .map-modal-overlay.open{display:flex;}
    .map-modal{
      background:#fff;width:90vw;max-width:900px;height:75vh;
      display:flex;flex-direction:column;border-top:4px solid var(--amber);
      position:relative;
    }
    .map-modal-header{
      background:var(--asphalt);color:var(--off-white);
      padding:14px 20px;display:flex;justify-content:space-between;align-items:center;
      font-size:15px;font-weight:600;
    }
    .map-modal-close{
      background:transparent;border:1px solid var(--amber);color:var(--amber);
      padding:6px 14px;font-size:13px;cursor:pointer;
    }
    .map-modal-close:hover{background:var(--amber);color:var(--asphalt);}
    #adminMap{flex:1;width:100%;}
    .map-legend{
      padding:10px 16px;background:var(--asphalt-deep);color:#9aa1ad;
      font-size:12px;display:flex;gap:18px;flex-wrap:wrap;
    }
    .map-legend span{display:flex;align-items:center;gap:6px;}
    .legend-dot{width:10px;height:10px;border-radius:50%;display:inline-block;}
  </style>
</head>
<body>
 
<header class="topbar">
  <div>
    <h1>John's Shuttle Admin</h1>
    <p>Bookings Dashboard</p>
  </div>
  <button class="logout-btn" id="logoutBtn">Log out</button>
</header>
 
<main class="container">
  <div class="toolbar">
    <div class="filter-tabs" id="filterTabs">
      <button data-filter="all" class="active">All</button>
      <button data-filter="new">New</button>
      <button data-filter="confirmed">Confirmed</button>
      <button data-filter="completed">Completed</button>
      <button data-filter="cancelled">Cancelled</button>
    </div>
    <div style="display:flex;gap:8px;">
      <button id="mapBtn">🗺 Map View</button>
      <button id="refreshBtn">Refresh</button>
    </div>
  </div>

  <!-- MAP MODAL -->
  <div class="map-modal-overlay" id="mapModalOverlay">
    <div class="map-modal">
      <div class="map-modal-header">
        <span>Bookings Map</span>
        <button class="map-modal-close" id="mapModalClose">Close</button>
      </div>
      <div id="adminMap"></div>
      <div class="map-legend">
        <span><span class="legend-dot" style="background:#f59e0b;"></span>New</span>
        <span><span class="legend-dot" style="background:#2F7A4D;"></span>Confirmed</span>
        <span><span class="legend-dot" style="background:#5C6470;"></span>Completed</span>
        <span><span class="legend-dot" style="background:#c0392b;"></span>Cancelled</span>
      </div>
    </div>
  </div>
 
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Phone</th>
          <th>Pickup</th>
          <th>Drop-off</th>
          <th>Date</th>
          <th>Time</th>
          <th>Pax</th>
          <th>Flight</th>
          <th>Notes</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="bookingsTable">
        <tr><td colspan="11" class="loading-state">Loading bookings…</td></tr>
      </tbody>
    </table>
  </div>
</main>
 
<script>
  const sb = window.supabase.createClient(
    "https://fcsulkjgynoyebmplpms.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjc3Vsa2pneW5veWVibXBscG1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNjczMTcsImV4cCI6MjA5NzY0MzMxN30.91Qw2w_ES9dKaeO37o8J29sh97Nzus1ZBth8fpnOTXI"
  );
 
  let currentFilter = 'all';
  let allBookings = [];
 
  // ---------- AUTH GUARD ----------
  // If nobody is logged in, bounce straight to the login page.
  // The data itself is also protected by RLS (server-side), so this check
  // is just for a clean user experience — the real security is in Supabase.
  async function checkAuth(){
    const { data } = await sb.auth.getSession();
    if(!data.session){
      window.location.href = 'login.html';
      return false;
    }
    return true;
  }
 
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await sb.auth.signOut();
    window.location.href = 'login.html';
  });
 
  // ---------- LOAD BOOKINGS ----------
  async function loadBookings(){
    const tbody = document.getElementById('bookingsTable');
    tbody.innerHTML = '<tr><td colspan="11" class="loading-state">Loading bookings…</td></tr>';
 
    const { data, error } = await sb
      .from('bookings')
      .select('*')
      .order('date', { ascending: true })
      .order('time', { ascending: true });
 
    if(error){
      console.error(error);
      tbody.innerHTML = `<tr><td colspan="11" class="empty-state">Could not load bookings. ${error.message.includes('JWT') ? 'Please log in again.' : 'Check console for details.'}</td></tr>`;
      return;
    }
 
    allBookings = data || [];
    renderBookings();
  }
 
  function renderBookings(){
    const tbody = document.getElementById('bookingsTable');
    const filtered = currentFilter === 'all'
      ? allBookings
      : allBookings.filter(b => (b.status || 'new') === currentFilter);
 
    if(filtered.length === 0){
      tbody.innerHTML = '<tr><td colspan="11" class="empty-state">No bookings here yet.</td></tr>';
      return;
    }
 
    tbody.innerHTML = filtered.map(b => `
      <tr data-id="${b.id}">
        <td>${escapeHtml(b.name)}</td>
        <td>${escapeHtml(b.phone)}</td>
        <td>${escapeHtml(b.pickup)}</td>
        <td>${escapeHtml(b.dropoff)}</td>
        <td>${escapeHtml(b.date)}</td>
        <td>${escapeHtml(b.time)}</td>
        <td>${b.passengers || '-'}</td>
        <td>${b.flight ? escapeHtml(b.flight) : '-'}</td>
        <td class="notes-cell">${b.notes ? escapeHtml(b.notes) : '-'}</td>
        <td>
          <select class="status-select" data-id="${b.id}">
            <option value="new" ${b.status === 'new' ? 'selected' : ''}>New</option>
            <option value="confirmed" ${b.status === 'confirmed' ? 'selected' : ''}>Confirmed</option>
            <option value="completed" ${b.status === 'completed' ? 'selected' : ''}>Completed</option>
            <option value="cancelled" ${b.status === 'cancelled' ? 'selected' : ''}>Cancelled</option>
          </select>
        </td>
        <td class="row-actions">
          <button class="delete-btn" data-id="${b.id}">Delete</button>
        </td>
      </tr>
    `).join('');
 
    // wire up status dropdowns
    tbody.querySelectorAll('.status-select').forEach(sel => {
      sel.addEventListener('change', async (e) => {
        const id = e.target.getAttribute('data-id');
        const newStatus = e.target.value;
        const { error } = await sb.from('bookings').update({ status: newStatus }).eq('id', id);
        if(error){
          alert('Could not update status: ' + error.message);
          return;
        }
        const b = allBookings.find(x => x.id == id);
        if(b) b.status = newStatus;
      });
    });
 
    // wire up delete buttons
    tbody.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        const id = e.target.getAttribute('data-id');
        if(!confirm('Delete this booking? This cannot be undone.')) return;
        const { error } = await sb.from('bookings').delete().eq('id', id);
        if(error){
          alert('Could not delete booking: ' + error.message);
          return;
        }
        allBookings = allBookings.filter(x => x.id != id);
        renderBookings();
      });
    });
  }
 
  function escapeHtml(str){
    if(str === null || str === undefined) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
 
  // ---------- FILTER TABS ----------
  document.getElementById('filterTabs').addEventListener('click', (e) => {
    if(e.target.tagName !== 'BUTTON') return;
    currentFilter = e.target.getAttribute('data-filter');
    document.querySelectorAll('#filterTabs button').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    renderBookings();
  });
 
  document.getElementById('refreshBtn').addEventListener('click', loadBookings);
 
  // ---------- INIT ----------
  (async () => {
    const ok = await checkAuth();
    if(ok) loadBookings();
  })();

  /* ============================================================
     ADMIN MAP VIEW
     Opens a modal with all bookings geocoded and pinned on a map.
     Pickup = filled pin, Drop-off = outlined pin.
     Color = status colour.
  ============================================================ */

  let adminMapInstance = null;
  let geocoderInstance = null;

  // Status → pin colour
  const STATUS_COLORS = {
    new: '#f59e0b',
    confirmed: '#2F7A4D',
    completed: '#5C6470',
    cancelled: '#c0392b'
  };

  function initAdminMap() {
    // Called by Google Maps API once loaded
    geocoderInstance = new google.maps.Geocoder();
  }

  async function geocodeAddress(address) {
    return new Promise((resolve) => {
      if (!geocoderInstance) { resolve(null); return; }
      geocoderInstance.geocode({ address: address + ', Australia' }, (results, status) => {
        if (status === 'OK' && results[0]) {
          resolve(results[0].geometry.location);
        } else {
          resolve(null);
        }
      });
    });
  }

  function makeMarkerIcon(color, isPickup) {
    // Returns a simple SVG pin — filled for pickup, ring for drop-off
    const fill = isPickup ? color : '#fff';
    const stroke = color;
    return {
      url: `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(
        `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="34" viewBox="0 0 24 34">
          <path d="M12 0C5.373 0 0 5.373 0 12c0 9 12 22 12 22s12-13 12-22C24 5.373 18.627 0 12 0z"
            fill="${fill}" stroke="${stroke}" stroke-width="2.5"/>
          <circle cx="12" cy="12" r="5" fill="${isPickup ? '#fff' : color}"/>
        </svg>`
      )}`,
      scaledSize: new google.maps.Size(24, 34),
      anchor: new google.maps.Point(12, 34)
    };
  }

  async function openMapView() {
    if (!window.google) {
      alert('Google Maps not loaded. Please add your API key to admin.html first.');
      return;
    }

    const overlay = document.getElementById('mapModalOverlay');
    overlay.classList.add('open');

    // Init map centred on Australia if first open
    if (!adminMapInstance) {
      adminMapInstance = new google.maps.Map(document.getElementById('adminMap'), {
        center: { lat: -33.8688, lng: 151.2093 }, // Sydney default
        zoom: 10,
        mapTypeControl: false,
        streetViewControl: false,
        fullscreenControl: false,
        styles: [
          { featureType: 'poi', elementType: 'labels', stylers: [{ visibility: 'off' }] }
        ]
      });
    }

    // Geocode each booking (pickup + dropoff) and place markers
    const bookings = allBookings.slice(0, 50); // cap at 50 to avoid API overuse
    const infoWindow = new google.maps.InfoWindow();
    const bounds = new google.maps.LatLngBounds();
    let markerCount = 0;

    for (const b of bookings) {
      const color = STATUS_COLORS[b.status || 'new'];

      // Geocode pickup
      if (b.pickup) {
        const pos = await geocodeAddress(b.pickup);
        if (pos) {
          const marker = new google.maps.Marker({
            position: pos,
            map: adminMapInstance,
            icon: makeMarkerIcon(color, true),
            title: `${b.name} — Pickup: ${b.pickup}`
          });
          marker.addListener('click', () => {
            infoWindow.setContent(`
              <div style="font-family:sans-serif;font-size:13px;line-height:1.5;max-width:200px;">
                <strong>${b.name}</strong><br>
                📍 <em>Pickup</em>: ${b.pickup}<br>
                🏁 Drop-off: ${b.dropoff}<br>
                📅 ${b.date} ${b.time}<br>
                <span style="color:${color};font-weight:600;text-transform:uppercase;font-size:11px;">${b.status || 'new'}</span>
              </div>
            `);
            infoWindow.open(adminMapInstance, marker);
          });
          bounds.extend(pos);
          markerCount++;
        }
      }

      // Geocode drop-off
      if (b.dropoff) {
        const pos = await geocodeAddress(b.dropoff);
        if (pos) {
          const marker = new google.maps.Marker({
            position: pos,
            map: adminMapInstance,
            icon: makeMarkerIcon(color, false),
            title: `${b.name} — Drop-off: ${b.dropoff}`
          });
          marker.addListener('click', () => {
            infoWindow.setContent(`
              <div style="font-family:sans-serif;font-size:13px;line-height:1.5;max-width:200px;">
                <strong>${b.name}</strong><br>
                📍 Pickup: ${b.pickup}<br>
                🏁 <em>Drop-off</em>: ${b.dropoff}<br>
                📅 ${b.date} ${b.time}<br>
                <span style="color:${color};font-weight:600;text-transform:uppercase;font-size:11px;">${b.status || 'new'}</span>
              </div>
            `);
            infoWindow.open(adminMapInstance, marker);
          });
          bounds.extend(pos);
          markerCount++;
        }
      }
    }

    if (markerCount > 0) {
      adminMapInstance.fitBounds(bounds);
    }
  }

  document.getElementById('mapBtn').addEventListener('click', openMapView);
  document.getElementById('mapModalClose').addEventListener('click', () => {
    document.getElementById('mapModalOverlay').classList.remove('open');
  });
  // Close on overlay click
  document.getElementById('mapModalOverlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('mapModalOverlay')) {
      document.getElementById('mapModalOverlay').classList.remove('open');
    }
  });

  /* ============================================================
     PWA — Register Service Worker
  ============================================================ */
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js')
        .catch(err => console.warn('[PWA] SW registration failed:', err));
    });
  }
</script>
 
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin - Bookings</title>
    <!-- Replace YOUR_GOOGLE_MAPS_API_KEY with your real key -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDAVKfary7LXwe4phYjwYgf-t96I8foxfM&libraries=places,geocoding" async defer></script>
<script>
  window.addEventListener('load', function() {
    var waitForMaps = setInterval(function() {
      if (window.google && window.google.maps && window.initAdminMap) {
        clearInterval(waitForMaps);
        window.initAdminMap();
      }
    }, 100);
  });
</script>
  <style>
    :root{
      --asphalt:#1B2430;
      --asphalt-deep:#11161D;
      --amber:#E8912D;
      --amber-bright:#F5A845;
      --off-white:#F7F5F0;
      --slate:#5C6470;
      --line:rgba(27,36,48,0.12);
      --green:#2F7A4D;
      --red:#c0392b;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      background:var(--off-white);
      color:var(--asphalt);
      font-family:'Inter',-apple-system,sans-serif;
      font-size:15px;
    }
    .topbar{
      background:var(--asphalt);color:var(--off-white);
      padding:20px 28px;border-bottom:3px solid var(--amber);
      display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;
    }
    .topbar h1{font-size:20px;font-weight:600;}
    .topbar p{font-size:13px;color:#9aa1ad;margin-top:2px;}
    .logout-btn{
      background:transparent;border:1px solid var(--amber);color:var(--amber);
      padding:8px 16px;font-size:13.5px;cursor:pointer;
    }
    .logout-btn:hover{background:var(--amber);color:var(--asphalt);}
    .container{max-width:1200px;margin:0 auto;padding:24px 28px 60px;}
    .toolbar{
      display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;
    }
    .toolbar button{
      background:var(--asphalt);color:var(--off-white);border:none;
      padding:10px 18px;font-size:13.5px;cursor:pointer;
    }
    .toolbar button:hover{background:var(--asphalt-deep);}
    .filter-tabs{display:flex;gap:8px;}
    .filter-tabs button{
      background:transparent;border:1px solid var(--line);color:var(--slate);
      padding:8px 14px;font-size:13px;cursor:pointer;
    }
    .filter-tabs button.active{background:var(--asphalt);color:var(--off-white);border-color:var(--asphalt);}
    table{width:100%;border-collapse:collapse;background:#fff;font-size:13.5px;}
    th, td{padding:12px 14px;text-align:left;border-bottom:1px solid var(--line);}
    th{
      background:var(--asphalt-deep);color:#9aa1ad;font-size:11.5px;
      letter-spacing:0.04em;text-transform:uppercase;font-weight:500;
    }
    tbody tr:hover{background:#faf8f3;}
    .status-badge{
      display:inline-block;padding:4px 10px;font-size:11.5px;font-weight:600;
      text-transform:uppercase;letter-spacing:0.03em;
    }
    .status-new{background:#fff4e6;color:#8a5a14;}
    .status-confirmed{background:rgba(47,122,77,0.12);color:var(--green);}
    .status-enroute{background:rgba(232,145,45,0.18);color:#b3700f;}
    .status-completed{background:rgba(27,36,48,0.08);color:var(--slate);}
    .status-cancelled{background:rgba(192,57,43,0.1);color:var(--red);}
    select.status-select, select.driver-select{
      font-size:12.5px;padding:5px 8px;border:1px solid var(--line);background:#fff;
    }
    .copy-msg-btn{
      font-size:12px;padding:5px 10px;border:1px solid var(--amber);
      background:#fff;cursor:pointer;color:var(--amber);white-space:nowrap;
    }
    .copy-msg-btn:hover{background:var(--amber);color:var(--asphalt);}
    .copy-msg-btn:disabled{opacity:0.4;cursor:not-allowed;}
    .lang-toggle-admin{display:flex;border:1px solid var(--line);margin-left:8px;}
    .lang-toggle-admin button{
      background:transparent;border:none;color:var(--slate);
      font-size:12px;font-weight:600;padding:6px 10px;cursor:pointer;
    }
    .lang-toggle-admin button.active{background:var(--asphalt);color:var(--off-white);}
    .toast-msg{
      position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
      background:var(--asphalt);color:var(--off-white);padding:10px 18px;
      font-size:13.5px;font-weight:600;border:1px solid var(--amber);
      opacity:0;transition:opacity .25s ease, transform .25s ease;
      pointer-events:none;z-index:200;
    }
    .toast-msg.show{opacity:1;transform:translateX(-50%) translateY(-4px);}
    .row-actions{display:flex;gap:6px;}
    .row-actions button{
      font-size:12px;padding:5px 10px;border:1px solid var(--line);background:#fff;cursor:pointer;
    }
    .row-actions button:hover{background:#f5f2ea;}
    .row-actions button.delete-btn:hover{background:var(--red);color:#fff;border-color:var(--red);}
    .empty-state{
      text-align:center;padding:60px 20px;color:var(--slate);font-size:14px;
    }
    .loading-state{text-align:center;padding:40px;color:var(--slate);}
    /* table only on large screens */
    .table-wrap{border:1px solid var(--line);overflow-x:hidden;}
    .notes-cell{max-width:160px;font-size:12.5px;color:var(--slate);}

    /* ── booking cards (default / narrow screens) ── */
    .booking-card{
      background:#fff;border:1px solid var(--line);margin-bottom:12px;
      padding:16px 18px;
    }
    .booking-card-head{
      display:flex;justify-content:space-between;align-items:flex-start;
      gap:10px;margin-bottom:12px;flex-wrap:wrap;
    }
    .booking-card-name{font-weight:600;font-size:15px;}
    .booking-card-meta{
      display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;
      margin-bottom:12px;font-size:13px;
    }
    .booking-card-meta .k{
      font-size:10.5px;text-transform:uppercase;letter-spacing:0.04em;
      color:var(--slate);display:block;margin-bottom:1px;
    }
    .booking-card-meta .v{color:var(--asphalt);}
    .booking-card-route{
      background:var(--off-white);padding:10px 12px;margin-bottom:12px;font-size:13px;
    }
    .booking-card-route .route-lbl{
      font-size:10.5px;text-transform:uppercase;letter-spacing:0.04em;color:var(--slate);
    }
    .booking-card-controls{
      display:flex;flex-direction:column;gap:8px;padding-top:12px;
      border-top:1px solid var(--line);
    }
    .booking-card-controls label{
      font-size:10.5px;text-transform:uppercase;letter-spacing:0.04em;
      color:var(--slate);display:block;margin-bottom:4px;
    }
    .booking-card-controls select{
      width:100%;font-size:13.5px;padding:8px 10px;
      border:1px solid var(--line);background:#fff;
    }
    .booking-card-actions{display:flex;gap:8px;margin-top:4px;flex-wrap:wrap;}
    .booking-card-actions button{flex:1;padding:9px 12px;font-size:13px;cursor:pointer;border:1px solid var(--line);background:#fff;}
    .booking-card-actions .copy-msg-btn{border-color:var(--amber);color:var(--amber);}
    .booking-card-actions .copy-msg-btn:hover{background:var(--amber);color:var(--asphalt);}
    .booking-card-actions .copy-msg-btn:disabled{opacity:0.4;cursor:not-allowed;}
    .booking-card-actions .delete-btn:hover{background:var(--red);color:#fff;border-color:var(--red);}

    /* hide table on narrow, show cards */
    .table-wrap table{display:none;}
    .cards-wrap{display:block;}

    /* on wide screens show table, hide cards */
    @media(min-width:1200px){
      .table-wrap{overflow-x:auto;}
      .table-wrap table{display:table;}
      .cards-wrap{display:none;}
    }

    /* ---- MAP MODAL ---- */
    .map-modal-overlay{
      display:none;position:fixed;inset:0;background:rgba(17,22,29,0.82);z-index:1000;
      align-items:center;justify-content:center;
    }
    .map-modal-overlay.open{display:flex;}
    .map-modal{
      background:#fff;width:95vw;max-width:900px;height:80vh;
      display:flex;flex-direction:column;border-top:4px solid var(--amber);
      position:relative;
    }
    @media(max-width:600px){
      .map-modal{width:100vw;height:90vh;border-radius:0;}
      .map-modal-overlay{align-items:flex-end;}
    }
    .map-modal-header{
      background:var(--asphalt);color:var(--off-white);
      padding:14px 20px;display:flex;justify-content:space-between;align-items:center;
      font-size:15px;font-weight:600;
    }
    .map-modal-close{
      background:transparent;border:1px solid var(--amber);color:var(--amber);
      padding:6px 14px;font-size:13px;cursor:pointer;
    }
    .map-modal-close:hover{background:var(--amber);color:var(--asphalt);}
    #adminMap{flex:1;width:100%;min-height:300px;}
    .map-legend{
      padding:10px 16px;background:var(--asphalt-deep);color:#9aa1ad;
      font-size:12px;display:flex;gap:18px;flex-wrap:wrap;
    }
    .map-legend span{display:flex;align-items:center;gap:6px;}
    .legend-dot{width:10px;height:10px;border-radius:50%;display:inline-block;}
  </style>
</head>
<body>
 
<header class="topbar">
  <div>
    <h1>John's Shuttle Admin</h1>
    <p>Bookings Dashboard</p>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="lang-toggle-admin">
      <button id="adminLangEn" class="active">EN</button>
      <button id="adminLangZh">中文</button>
    </div>
    <button class="logout-btn" id="logoutBtn">Log out</button>
  </div>
</header>
<div class="toast-msg" id="toastMsg"></div>
 
<main class="container">
  <div class="toolbar">
    <div class="filter-tabs" id="filterTabs">
      <button data-filter="all" class="active">All</button>
      <button data-filter="new">New</button>
      <button data-filter="confirmed">Confirmed</button>
      <button data-filter="enroute">En route</button>
      <button data-filter="completed">Completed</button>
      <button data-filter="cancelled">Cancelled</button>
    </div>
    <div style="display:flex;gap:8px;">
      <button id="mapBtn">🗺 Map View</button>
      <button id="refreshBtn">Refresh</button>
    </div>
  </div>

  <!-- MAP MODAL -->
  <div class="map-modal-overlay" id="mapModalOverlay">
    <div class="map-modal">
      <div class="map-modal-header">
        <span>Bookings Map</span>
        <button class="map-modal-close" id="mapModalClose">Close</button>
      </div>
      <div id="adminMap"></div>
      <div class="map-legend">
        <span><span class="legend-dot" style="background:#f59e0b;"></span>New</span>
        <span><span class="legend-dot" style="background:#2F7A4D;"></span>Confirmed</span>
        <span><span class="legend-dot" style="background:#5C6470;"></span>Completed</span>
        <span><span class="legend-dot" style="background:#c0392b;"></span>Cancelled</span>
      </div>
    </div>
  </div>
 
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Phone</th>
          <th>Pickup</th>
          <th>Drop-off</th>
          <th>Date</th>
          <th>Time</th>
          <th>Pax</th>
          <th>Flight</th>
          <th>Notes</th>
          <th>Driver</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="bookingsTable">
        <tr><td colspan="12" class="loading-state">Loading bookings…</td></tr>
      </tbody>
    </table>
  </div>

  <div class="cards-wrap" id="bookingsCards">
    <div class="loading-state" style="padding:40px;text-align:center;color:var(--slate);">Loading bookings…</div>
  </div>
</main>
 
<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
  const sb = createClient(
    "https://fcsulkjgynoyebmplpms.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjc3Vsa2pneW5veWVibXBscG1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNjczMTcsImV4cCI6MjA5NzY0MzMxN30.91Qw2w_ES9dKaeO37o8J29sh97Nzus1ZBth8fpnOTXI"
  );

  // ── i18n ──────────────────────────────────────────────────────────────
  const DISPATCH_MSG = {
    en: (b, driver, link) => `🚗 John's Shuttle
✅ Job Assigned
📋 Order #${b.id}
📅 ${b.date} ${b.time}
🔖 Type: ${b.service_type || (b.flight ? 'Airport transfer' : 'Transfer')}
🚘 Passengers: ${b.passengers || 1}
${b.flight ? `✈️ Flight: ${b.flight}
` : ''}📍 Pickup: ${b.pickup}
🏁 Drop-off: ${b.dropoff}
👤 Customer: ${b.name}
📞 Phone: ${b.phone || '—'}
${driver ? `🧑‍✈️ Driver: ${driver.name}` : ''}

👆 Tap to update job status:
${link}`,

    zh: (b, driver, link) => `🚗 浩一行接送机服务
✅ 已派单
📋 订单号：${b.id}
📅 ${b.date} ${b.time}
🔖 类型：${b.service_type || (b.flight ? '接送机' : '接送服务')}
🚘 乘客：${b.passengers || 1}人
${b.flight ? `✈️ 航班：${b.flight}
` : ''}📍 出发：${b.pickup}
🏁 目的地：${b.dropoff}
👤 客户：${b.name}
📞 电话：${b.phone || '—'}
${driver ? `🧑‍✈️ 司机：${driver.name}` : ''}

👆 点击更新行程状态：
${link}`
  };

  let adminLang = 'en';
  document.getElementById('adminLangEn').addEventListener('click', () => setAdminLang('en'));
  document.getElementById('adminLangZh').addEventListener('click', () => setAdminLang('zh'));
  function setAdminLang(l){
    adminLang = l;
    document.getElementById('adminLangEn').classList.toggle('active', l === 'en');
    document.getElementById('adminLangZh').classList.toggle('active', l === 'zh');
  }

  // ── Toast ──────────────────────────────────────────────────────────────
  function toast(msg){
    const el = document.getElementById('toastMsg');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2200);
  }

  // ── State ──────────────────────────────────────────────────────────────
  let currentFilter = 'all';
  let allBookings = [];
  let allDrivers = [];

  // ── Auth guard ────────────────────────────────────────────────────────
  async function checkAuth(){
    const { data } = await sb.auth.getSession();
    if(!data.session){ window.location.href = 'login.html'; return false; }
    return true;
  }
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await sb.auth.signOut();
    window.location.href = 'login.html';
  });

  // ── Load drivers ──────────────────────────────────────────────────────
  async function loadDrivers(){
    const { data } = await sb.from('drivers').select('*').eq('active', true).order('name');
    allDrivers = data || [];
  }

  // ── Load bookings ─────────────────────────────────────────────────────
  async function loadBookings(){
    const tbody = document.getElementById('bookingsTable');
    tbody.innerHTML = '<tr><td colspan="12" class="loading-state">Loading bookings…</td></tr>';
    await loadDrivers();
    const { data, error } = await sb
      .from('bookings').select('*')
      .order('date', { ascending: true })
      .order('time', { ascending: true });
    if(error){
      tbody.innerHTML = `<tr><td colspan="12" class="empty-state">Could not load bookings. ${error.message}</td></tr>`;
      return;
    }
    allBookings = data || [];
    renderBookings();
  }

  function escapeHtml(str){
    if(str === null || str === undefined) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ── Shared driver options HTML ────────────────────────────────────────
  function driverOptions(selectedId){
    return `<option value="">— Unassigned —</option>` +
      allDrivers.map(d => `<option value="${d.id}" ${selectedId === d.id ? 'selected' : ''}>${escapeHtml(d.name)}</option>`).join('');
  }

  // ── Shared status options HTML ─────────────────────────────────────────
  function statusOptions(current){
    const opts = ['new','confirmed','enroute','completed','cancelled'];
    const labels = {new:'New',confirmed:'Confirmed',enroute:'En route',completed:'Completed',cancelled:'Cancelled'};
    return opts.map(v => `<option value="${v}" ${(current||'new')===v?'selected':''}>${labels[v]}</option>`).join('');
  }

  // ── Wire up events on a container (table tbody or cards div) ───────────
  function wireEvents(container){
    container.querySelectorAll('.driver-select').forEach(sel => {
      sel.addEventListener('change', async (e) => {
        const id = e.target.getAttribute('data-id');
        const newDriverId = e.target.value || null;
        const { error } = await sb.from('bookings').update({ driver_id: newDriverId }).eq('id', id);
        if(error){ alert('Could not assign driver: ' + error.message); return; }
        const b = allBookings.find(x => x.id == id);
        if(b) b.driver_id = newDriverId;
        renderBookings();
        toast(adminLang === 'zh' ? '司机已分配' : 'Driver assigned');
      });
    });
    container.querySelectorAll('.status-select').forEach(sel => {
      sel.addEventListener('change', async (e) => {
        const id = e.target.getAttribute('data-id');
        const newStatus = e.target.value;
        const { error } = await sb.from('bookings').update({ status: newStatus }).eq('id', id);
        if(error){ alert('Could not update status: ' + error.message); return; }
        const b = allBookings.find(x => x.id == id);
        if(b) b.status = newStatus;
      });
    });
    container.querySelectorAll('.copy-msg-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = e.target.getAttribute('data-id');
        const b = allBookings.find(x => x.id == id);
        if(!b) return;
        const driver = allDrivers.find(d => d.id === b.driver_id);
        const link = `${location.origin}/driver.html?id=${b.id}`;
        const msg = DISPATCH_MSG[adminLang](b, driver, link);
        navigator.clipboard.writeText(msg).then(() => {
          toast(adminLang === 'zh' ? '✅ 消息已复制，请粘贴到微信发送' : '✅ Message copied — paste into WeChat');
        }).catch(() => {
          const ta = document.createElement('textarea');
          ta.value = msg;
          ta.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);width:90vw;max-width:500px;height:260px;z-index:300;padding:12px;font-size:13px;border:2px solid var(--amber);';
          document.body.appendChild(ta);
          ta.select();
          const close = document.createElement('button');
          close.textContent = 'Close';
          close.style.cssText = 'position:fixed;top:290px;left:50%;transform:translateX(-50%);z-index:300;padding:8px 20px;background:var(--asphalt);color:#fff;border:none;cursor:pointer;';
          close.onclick = () => { ta.remove(); close.remove(); };
          document.body.appendChild(close);
          document.execCommand('copy');
        });
      });
    });
    container.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        const id = e.target.getAttribute('data-id');
        if(!confirm('Delete this booking? This cannot be undone.')) return;
        const { error } = await sb.from('bookings').delete().eq('id', id);
        if(error){ alert('Could not delete booking: ' + error.message); return; }
        allBookings = allBookings.filter(x => x.id != id);
        renderBookings();
      });
    });
  }

  // ── Render ────────────────────────────────────────────────────────────
  function renderBookings(){
    const tbody = document.getElementById('bookingsTable');
    const cardsWrap = document.getElementById('bookingsCards');
    const filtered = currentFilter === 'all'
      ? allBookings
      : allBookings.filter(b => (b.status || 'new') === currentFilter);

    if(filtered.length === 0){
      tbody.innerHTML = '<tr><td colspan="12" class="empty-state">No bookings here yet.</td></tr>';
      cardsWrap.innerHTML = '<div class="empty-state">No bookings here yet.</div>';
      return;
    }

    // ── TABLE rows (shown on wide screens) ─────────────────────────────
    tbody.innerHTML = filtered.map(b => `
      <tr data-id="${b.id}">
        <td>${escapeHtml(b.name)}</td>
        <td>${escapeHtml(b.phone)}</td>
        <td>${escapeHtml(b.pickup)}</td>
        <td>${escapeHtml(b.dropoff)}</td>
        <td>${escapeHtml(b.date)}</td>
        <td>${escapeHtml(b.time)}</td>
        <td>${b.passengers || '-'}</td>
        <td>${b.flight ? escapeHtml(b.flight) : '-'}</td>
        <td class="notes-cell">${b.notes ? escapeHtml(b.notes) : '-'}</td>
        <td><select class="driver-select" data-id="${b.id}">${driverOptions(b.driver_id)}</select></td>
        <td><select class="status-select" data-id="${b.id}">${statusOptions(b.status)}</select></td>
        <td class="row-actions">
          <button class="copy-msg-btn" data-id="${b.id}" ${!b.driver_id ? 'disabled title="Assign a driver first"' : ''}>📋 Copy msg</button>
          <button class="delete-btn" data-id="${b.id}">Delete</button>
        </td>
      </tr>`).join('');
    wireEvents(tbody);

    // ── CARDS (shown on narrow screens) ───────────────────────────────
    const STATUS_LABELS = {new:'New',confirmed:'Confirmed',enroute:'En route',completed:'Completed',cancelled:'Cancelled'};
    const STATUS_CLS = {new:'status-new',confirmed:'status-confirmed',enroute:'status-enroute',completed:'status-completed',cancelled:'status-cancelled'};
    cardsWrap.innerHTML = filtered.map(b => `
      <div class="booking-card" data-id="${b.id}">
        <div class="booking-card-head">
          <div>
            <div class="booking-card-name">${escapeHtml(b.name)}</div>
            <div style="font-size:12px;color:var(--slate);margin-top:2px;">${escapeHtml(b.phone)}</div>
          </div>
          <span class="status-badge ${STATUS_CLS[b.status||'new']}">${STATUS_LABELS[b.status||'new']}</span>
        </div>
        <div class="booking-card-route">
          <div class="route-lbl">📍 Pickup</div>
          <div style="margin-bottom:6px;">${escapeHtml(b.pickup)}</div>
          <div class="route-lbl">🏁 Drop-off</div>
          <div>${escapeHtml(b.dropoff)}</div>
        </div>
        <div class="booking-card-meta">
          <div><span class="k">Date</span><span class="v">${escapeHtml(b.date)}</span></div>
          <div><span class="k">Time</span><span class="v">${escapeHtml(b.time)}</span></div>
          <div><span class="k">Pax</span><span class="v">${b.passengers || '-'}</span></div>
          <div><span class="k">Flight</span><span class="v">${b.flight ? escapeHtml(b.flight) : '-'}</span></div>
          ${b.notes ? `<div style="grid-column:1/-1"><span class="k">Notes</span><span class="v">${escapeHtml(b.notes)}</span></div>` : ''}
        </div>
        <div class="booking-card-controls">
          <div>
            <label>Assign driver</label>
            <select class="driver-select" data-id="${b.id}">${driverOptions(b.driver_id)}</select>
          </div>
          <div>
            <label>Status</label>
            <select class="status-select" data-id="${b.id}">${statusOptions(b.status)}</select>
          </div>
          <div class="booking-card-actions">
            <button class="copy-msg-btn" data-id="${b.id}" ${!b.driver_id ? 'disabled title="Assign a driver first"' : ''}>📋 Copy dispatch msg</button>
            <button class="delete-btn" data-id="${b.id}">Delete</button>
          </div>
        </div>
      </div>`).join('');
    wireEvents(cardsWrap);
  }

  // ── Filter tabs ───────────────────────────────────────────────────────
  document.getElementById('filterTabs').addEventListener('click', (e) => {
    if(e.target.tagName !== 'BUTTON') return;
    currentFilter = e.target.getAttribute('data-filter');
    document.querySelectorAll('#filterTabs button').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    renderBookings();
  });

  document.getElementById('refreshBtn').addEventListener('click', loadBookings);

  // ── Init ──────────────────────────────────────────────────────────────
  (async () => {
    const ok = await checkAuth();
    if(ok) loadBookings();
  })();

  /* ── MAP VIEW (unchanged from original) ──────────────────────────────── */
  let adminMapInstance = null;
  let geocoderInstance = null;
  const STATUS_COLORS = { new:'#f59e0b', confirmed:'#2F7A4D', enroute:'#E8912D', completed:'#5C6470', cancelled:'#c0392b' };

  window.initAdminMap = function() { geocoderInstance = new google.maps.Geocoder(); }

  async function geocodeAddress(address){
    return new Promise((resolve) => {
      if(!geocoderInstance){ resolve(null); return; }
      geocoderInstance.geocode({ address: address + ', Australia' }, (results, status) => {
        resolve(status === 'OK' && results[0] ? results[0].geometry.location : null);
      });
    });
  }

  function makeMarkerIcon(color, isPickup){
    const fill = isPickup ? color : '#fff';
    return {
      url: `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(
        `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="34" viewBox="0 0 24 34">
          <path d="M12 0C5.373 0 0 5.373 0 12c0 9 12 22 12 22s12-13 12-22C24 5.373 18.627 0 12 0z"
            fill="${fill}" stroke="${color}" stroke-width="2.5"/>
          <circle cx="12" cy="12" r="5" fill="${isPickup ? '#fff' : color}"/>
        </svg>`
      )}`,
      scaledSize: new google.maps.Size(24, 34),
      anchor: new google.maps.Point(12, 34)
    };
  }

  async function openMapView(){
    if(!window.google){ alert('Google Maps not loaded.'); return; }
    const overlay = document.getElementById('mapModalOverlay');
    overlay.classList.add('open');
    if(!adminMapInstance){
      adminMapInstance = new google.maps.Map(document.getElementById('adminMap'), {
        center:{ lat:-33.8688, lng:151.2093 }, zoom:10,
        mapTypeControl:false, streetViewControl:false, fullscreenControl:false,
        styles:[{ featureType:'poi', elementType:'labels', stylers:[{ visibility:'off' }] }]
      });
    }
    const bookings = allBookings.slice(0, 50);
    const infoWindow = new google.maps.InfoWindow();
    const bounds = new google.maps.LatLngBounds();
    let count = 0;
    for(const b of bookings){
      const color = STATUS_COLORS[b.status || 'new'];
      for(const [addr, isPickup] of [[b.pickup, true],[b.dropoff, false]]){
        if(!addr) continue;
        const pos = await geocodeAddress(addr);
        if(!pos) continue;
        const marker = new google.maps.Marker({
          position:pos, map:adminMapInstance,
          icon:makeMarkerIcon(color, isPickup),
          title:`${b.name} — ${isPickup?'Pickup':'Drop-off'}: ${addr}`
        });
        marker.addListener('click', () => {
          infoWindow.setContent(`<div style="font-family:sans-serif;font-size:13px;line-height:1.5;max-width:200px;">
            <strong>${b.name}</strong><br>
            ${isPickup ? '📍 <em>Pickup</em>' : '🏁 <em>Drop-off</em>'}: ${addr}<br>
            📅 ${b.date} ${b.time}<br>
            <span style="color:${color};font-weight:600;text-transform:uppercase;font-size:11px;">${b.status||'new'}</span>
          </div>`);
          infoWindow.open(adminMapInstance, marker);
        });
        bounds.extend(pos); count++;
      }
    }
    if(count > 0) adminMapInstance.fitBounds(bounds);
  }

  document.getElementById('mapBtn').addEventListener('click', openMapView);
  document.getElementById('mapModalClose').addEventListener('click', () => {
    document.getElementById('mapModalOverlay').classList.remove('open');
  });
  document.getElementById('mapModalOverlay').addEventListener('click', (e) => {
    if(e.target === document.getElementById('mapModalOverlay'))
      document.getElementById('mapModalOverlay').classList.remove('open');
  });

  /* ── PWA ── */
  if('serviceWorker' in navigator){
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js')
        .catch(err => console.warn('[PWA] SW failed:', err));
    });
  }
</script>

</body>
</html>
